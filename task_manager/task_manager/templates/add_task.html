{% extends "base.html" %}

{% block content %}

<style>
    body {
        min-height: 100vh;
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #e0f7fa, #fce4ec, #ede7f6);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .task-card {
        width: 420px;
        padding: 40px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        animation: fadeIn 0.6s ease-in-out;
        transition: 0.3s ease;
    }

    .task-card:hover {
        transform: translateY(-4px);
    }

    .task-card h3 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 26px;
        font-weight: 600;
        color: #6a5acd;
        letter-spacing: 1px;
    }

    .task-card label {
        font-weight: 500;
        font-size: 14px;
        color: #555;
    }

    .task-card input {
        width: 100%;
        padding: 14px;
        margin-top: 8px;
        margin-bottom: 25px;
        border-radius: 14px;
        border: 1px solid #e0e0e0;
        outline: none;
        font-size: 14px;
        background: #ffffff;
        transition: 0.3s ease;
    }

    .task-card input:focus {
        border-color: #b39ddb;
        box-shadow: 0 0 0 3px rgba(179, 157, 219, 0.25);
        transform: scale(1.02);
    }

    .task-card button {
        width: 100%;
        padding: 14px;
        border-radius: 40px;
        border: none;
        font-size: 15px;
        font-weight: 600;
        background: linear-gradient(to right, #ffcad4, #cdb4db);
        color: #4a4a4a;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .task-card button:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 20px rgba(205, 180, 219, 0.3);
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-15px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @media (max-width: 480px) {
        .task-card {
            width: 90%;
            padding: 30px;
        }
    }
</style>

<div class="task-card">
    <h3>Add New Task</h3>

    <form method="POST">
        <label for="title">Task Title</label>
        <input type="text" id="title" name="title" placeholder="Enter your task..." required>

        <button type="submit">Add Task ✨</button>
    </form>
</div>

{% endblock %}
