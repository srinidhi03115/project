<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Soft aesthetic background image */
            background: 
                linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)),
                url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");

            background-size: cover;
            background-position: center;
        }

        /* Main Card */
        .main-container {
            width: 420px;
            padding: 35px;
            border-radius: 15px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            color: #333;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            font-weight: 600;
        }

        hr {
            margin-bottom: 25px;
            border: none;
            height: 1px;
            background-color: #eee;
        }

        h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        input:focus {
            outline: none;
            border-color: #aaa;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #6c63ff;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #574fd6;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #6c63ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            .main-container {
                width: 90%;
            }
        }
    </style>
</head>

<body>
    <div class="main-container">
        <h2>Employee Task Manager</h2>
        <hr>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
